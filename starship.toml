format = """
$username\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$rust\
$nodejs\
$docker_context\
$python\
$line_break\
$character"""

[username]
show_always = true

[git_branch]
format = "→ [$symbol$branch]($style) "

[character]
success_symbol = "[→](bold green)"
error_symbol = "[→](bold red)"

[line_break]
disabled = true
